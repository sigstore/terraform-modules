name: Terraform Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  terraform-fmt:
    name: 'Terraform fmt'
    runs-on: ubuntu-latest

    permissions:
      contents: read
    steps:
      - name: 'Checkout'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # this points back to this file in case there are any changes in the 'go install' command below
          cache-dependency-path: '.github/workflows/terraform.yml'

      - name: Detect version of Terraform needed
        id: version
        run: |
            go install github.com/hashicorp/terraform-config-inspect@latest
            echo "terraform-version=$(terraform-config-inspect --json ./gcp/modules/sigstore | jq -r .required_core[0])" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.version.outputs.terraform-version }}

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive -diff .

  terraform-validate-matrix:
    name: 'Terraform validate matrix'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        working-directory:
          - ./gcp/modules/sigstore
          - ./gcp/modules/sigstore_global
          - ./gcp/modules/tiles_tlog
          - ./gcp/modules/external_secrets
          - ./gcp/modules/argocd

    steps:
      - name: 'Checkout'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # this points back to this file in case there are any changes in the 'go install' command below
          cache-dependency-path: '.github/workflows/terraform.yml'

      - name: Detect version of Terraform needed
        id: version
        run: |
            go install github.com/hashicorp/terraform-config-inspect@latest
            echo "terraform-version=$(terraform-config-inspect --json . | jq -r .required_core[0])" >> "$GITHUB_OUTPUT"
        working-directory: ${{ matrix.working-directory }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.version.outputs.terraform-version }}

      - name: Terraform init
        id: init
        run: terraform init
        working-directory: ${{ matrix.working-directory }}

      - name: Terraform validate
        id: validate
        run: terraform validate
        working-directory: ${{ matrix.working-directory }}

  # Dummy aggregator job
  terraform-validate:
    name: 'Terraform validate'
    runs-on: ubuntu-latest
    needs: [terraform-validate-matrix]
    steps:
      - run: echo "All standalone modules validated successfully"

  terraform-tfsec:
    name: 'Terraform tfsec'
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write

      # only required for workflows in private repositories
      actions: read
      contents: read

    steps:
      - name: 'Checkout'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: tfsec
        uses: tfsec/tfsec-sarif-action@21ded20e8ca120cd9d3d6ab04ef746477542a608 # v0.1.0
        with:
          sarif_file: tfsec.sarif
          working_directory: '.'
          tfsec_args: --force-all-dirs --verbose

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          # Path to SARIF file relative to the root of the repository
          sarif_file: tfsec.sarif
